<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f6f2e9">
    <meta
      name="description"
      content="Calendario della raccolta rifiuti per gli ospiti della casa vacanze."
    >
    <title>Calendario raccolta rifiuti</title>
    <link rel="stylesheet" href="../assets/style.css">
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.21/index.global.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/@fullcalendar/google-calendar@6.1.21/index.global.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.21/locales/it.global.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.21/locales/en-gb.global.min.js"
    ></script>
    <script defer src="../assets/config.js"></script>
    <script defer src="../assets/app.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#calendar">Vai al calendario</a>

    <div class="page-shell">
      <header class="site-header">
        <div class="header-copy">
          <p class="eyebrow">Promemoria per il soggiorno</p>
          <h1>Calendario raccolta rifiuti</h1>
          <p class="intro">
            Consulta i giorni di raccolta durante il tuo soggiorno.
          </p>
        </div>

        <nav class="language-switcher" aria-label="Seleziona la lingua">
          <span aria-current="page">IT</span>
          <a href="../en/" lang="en" hreflang="en">EN</a>
        </nav>
      </header>

      <main>
        <section class="calendar-card" aria-label="Calendario della raccolta">
          <p id="calendar-status" class="calendar-status" aria-live="polite" hidden></p>
          <div id="calendar-error" class="calendar-error" role="alert" hidden></div>
          <noscript>
            <p class="calendar-error">
              Per visualizzare il calendario è necessario attivare JavaScript.
            </p>
          </noscript>
          <div id="calendar"></div>
        </section>
      </main>

      <footer class="site-footer">
        <p>Calendario aggiornato tramite Google Calendar.</p>
      </footer>
    </div>
  </body>
</html>
